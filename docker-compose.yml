services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: que-backend
    restart: always
    env_file: server/.env
    ports:
      - "127.0.0.1:3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - que-network

networks:
  que-network:
    external: true
